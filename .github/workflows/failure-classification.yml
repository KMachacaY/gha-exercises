name: Failure Classification Exercise

on:
  workflow_dispatch:
    inputs:
      failure_type:
        description: "Which failure to simulate"
        type: choice
        options:
          - test_failure
          - build_failure
          - all_pass
        default: all_pass
        required: true

jobs:
  simulate-failure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ "${{ github.event.inputs.failure_type }}" = "build_failure" ]; then
            echo "Simulating build failure - bad install command"
            npm ci --invalid-flag-that-does-not-exist
          else
            npm ci
          fi

      - name: Run tests
        run: |
          if [ "${{ github.event.inputs.failure_type }}" = "test_failure" ]; then
            echo "Simulating test failure"
            node -e "
              const assert = require('assert');
              console.log('Running test: expected 5, got 4');
              assert.strictEqual(2 + 2, 5, 'Addition result was wrong: expected 5 but got 4');
            "
          else
            npm test
          fi

      - name: Post-test summary
        if: always()
        run: echo "Job completed with failure type ${{ github.event.inputs.failure_type }}"